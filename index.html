<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>홍콩 여행</title>
<style>
  body {
    text-align: center;
    font-family: sans-serif;
    background: linear-gradient(to bottom, #ffe8e8, #f9f9f9);
  }
  h1 {
    color: rgb(180, 20, 20);
    text-shadow: 2px 2px 8px gray;
    margin-bottom: 30px;
  }
  ul {
    display: inline-block;
    text-align: left;
    padding-left: 20px;
    margin-bottom: 40px;
  }
  li {
    list-style-type: square;
    margin: 8px 0;
  }
  h2 {
    color: rgb(20, 100, 180);
    margin-top: 40px;
    margin-bottom: 20px;
  }
  .grid {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .card {
    text-align: center;
    width: 250px;
  }
  .card img {
    display: block;
    margin: 0 auto;
    width: 100%;
    border-radius: 12px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
  }
  .highlight {
    color: darkblue;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>홍콩 여행</h1>

<ul>
  <li><h2>수도</h2> 홍콩 특별행정구</li><br>
  <li><h2>기후</h2> 아열대성 기후로 여름은 덥고 습함</li><br>
</ul>

<h2>추천 명소</h2>
<div class="grid">
  <div class="card">
    <h3>빅토리아 피크</h3>
    <img src="빅토리아.webp" alt="빅토리아 피크">
  </div>
  <div class="card">
    <h3>몽콕 야시장</h3>
    <img src="야시장.jpg" alt="몽콕 야시장">
  </div>
  <div class="card">
    <h3>홍콩 디즈니랜드</h3>
    <img src="디즈니랜드.jpg" alt="홍콩 디즈니랜드">
  </div>
</div>

<h2>홍콩 음식</h2>
<div class="grid">
  <div class="card">
    <h3>딤섬</h3>
    <img src="딤섬.jpg" alt="딤섬">
  </div>
  <div class="card">
    <h3>완탕면</h3>
    <img src="완탕면.jpg" alt="완탕면">
  </div>
  <div class="card">
    <h3>에그타르트</h3>
    <img src="에그타르트.jpg" alt="에그타르트"><br>
     <a href="축제.html">축제 사이트</a>
  </div>
</div>

</body>
</html>
